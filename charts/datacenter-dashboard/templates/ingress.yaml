{{- if .Values.ingress.enabled -}}
{{- $tls := .Values.ingress.tls -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "datacenter-dashboard.fullname" . }}
  labels:
    {{- include "datacenter-dashboard.labels" . | nindent 4 }}
  {{- if $tls.enabled }}
  annotations:
    {{- if eq $tls.issuerKind "ClusterIssuer" }}
    cert-manager.io/cluster-issuer: {{ $tls.issuerName | quote }}
    {{- else }}
    cert-manager.io/issuer: {{ $tls.issuerName | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if $tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ $tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "datacenter-dashboard.fullname" . }}
                port:
                  name: http
{{- end }}
