name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
  workflow_dispatch:  # allow manual runs from the GitHub Actions UI

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p docs
          helm package charts/datacenter-dashboard-helm -d docs/

      - name: Update repo index
        run: |
          helm repo index docs/ \
            --url https://rhou7873.github.io/datacenter-dashboard

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/
          git diff --cached --quiet || git commit -m "chore: publish helm chart [skip ci]"
          git push
